<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hero placeholder for site/index.html.
  Sumi-e ink composition: a torii silhouette beyond a circular barrier
  motif (kekkai), with bamboo and faint moon. Renders entirely in
  monochrome and sits in the right-side hero column until the commissioned
  anime-style key visual ships into assets/sigil-hero.png.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 720 540"
  role="img"
  aria-label="Sumi-e ink illustration: a torii gate behind a circular barrier pattern, with bamboo and a faint moon."
>
  <defs>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0c0b08" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#0c0b08" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="washiTone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0b08" stop-opacity="0" />
      <stop offset="100%" stop-color="#0c0b08" stop-opacity="0.05" />
    </linearGradient>
    <pattern id="paperGrain" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="transparent" />
      <circle cx="14" cy="22" r="0.45" fill="#0c0b08" opacity="0.06" />
      <circle cx="42" cy="68" r="0.4" fill="#0c0b08" opacity="0.05" />
      <circle cx="88" cy="34" r="0.5" fill="#0c0b08" opacity="0.07" />
      <circle cx="110" cy="100" r="0.4" fill="#0c0b08" opacity="0.05" />
      <circle cx="62" cy="14" r="0.4" fill="#0c0b08" opacity="0.05" />
    </pattern>
  </defs>

  <!-- Subtle vertical tone wash, like aged washi paper. -->
  <rect width="720" height="540" fill="url(#washiTone)" />
  <rect width="720" height="540" fill="url(#paperGrain)" />

  <!-- Moon glow behind the gate. -->
  <circle cx="430" cy="180" r="140" fill="url(#moonGlow)" />
  <circle cx="430" cy="180" r="62" fill="none" stroke="#0c0b08" stroke-width="0.8" opacity="0.18" />

  <!-- Distant bamboo stems on the left edge. -->
  <g opacity="0.32" stroke="#0c0b08" stroke-linecap="round" fill="none">
    <path d="M48 80 Q44 220 52 360 Q56 460 50 520" stroke-width="2.4" />
    <path d="M48 100 L62 96" stroke-width="1.2" />
    <path d="M50 192 L66 188" stroke-width="1.2" />
    <path d="M52 296 L68 292" stroke-width="1.2" />
    <path d="M50 392 L66 388" stroke-width="1.2" />
    <path d="M88 60 Q86 200 94 340 Q98 440 92 510" stroke-width="2.0" />
    <path d="M90 158 L106 154" stroke-width="1.1" />
    <path d="M92 264 L108 260" stroke-width="1.1" />
    <path d="M94 372 L110 368" stroke-width="1.1" />
    <!-- Bamboo leaves clustered near the top. -->
    <path d="M60 78 q12 -10 26 -6" stroke-width="1.4" />
    <path d="M58 84 q14 -2 28 4" stroke-width="1.4" />
    <path d="M100 56 q10 -8 22 -4" stroke-width="1.4" />
  </g>

  <!-- Kekkai (barrier) — concentric circles with one outer arc, behind the gate. -->
  <g stroke="#0c0b08" fill="none" opacity="0.55">
    <circle cx="430" cy="320" r="178" stroke-width="0.8" />
    <circle cx="430" cy="320" r="158" stroke-width="0.6" stroke-dasharray="2 6" opacity="0.55" />
    <circle cx="430" cy="320" r="136" stroke-width="0.6" opacity="0.45" />
    <!-- Imperfect outer brush ring -->
    <path
      d="M608 320
         a178 178 0 0 1 -8 56
         M252 320
         a178 178 0 0 1 8 -56
         M430 142
         a178 178 0 0 1 48 8
         M430 498
         a178 178 0 0 1 -52 -10"
      stroke-width="1.6"
      stroke-linecap="round"
      opacity="0.78"
    />
  </g>

  <!-- Torii gate silhouette, simplified. -->
  <g stroke="#0c0b08" stroke-linecap="square" fill="none">
    <!-- Kasagi (top crossbar) -->
    <path d="M330 220 Q430 206 530 220 L530 230 L330 230 Z" fill="#0c0b08" />
    <!-- Shimaki (second crossbar) -->
    <rect x="340" y="252" width="180" height="6" fill="#0c0b08" />
    <!-- Pillars -->
    <rect x="356" y="230" width="10" height="200" fill="#0c0b08" />
    <rect x="494" y="230" width="10" height="200" fill="#0c0b08" />
    <!-- Nuki (horizontal beam through pillars) -->
    <rect x="346" y="288" width="168" height="4" fill="#0c0b08" />
  </g>

  <!-- Stone path approach, fading into the distance. -->
  <g stroke="#0c0b08" opacity="0.35" fill="none">
    <path d="M120 480 Q300 460 360 460" stroke-width="1.2" />
    <path d="M120 510 Q300 488 360 488" stroke-width="1.2" />
    <path d="M360 460 Q500 472 700 478" stroke-width="1.2" />
    <path d="M360 488 Q500 498 700 506" stroke-width="1.2" />
  </g>

  <!-- Single ink brush stroke marking the seal — a quiet signature. -->
  <g transform="translate(596 472)">
    <rect x="-22" y="-22" width="44" height="44" fill="none" stroke="#0c0b08" stroke-width="1.4" />
    <path
      d="M-12 -6 Q0 -16 12 -8 M-10 4 Q0 14 12 6"
      stroke="#0c0b08"
      stroke-width="1.6"
      stroke-linecap="round"
      fill="none"
    />
  </g>
</svg>
